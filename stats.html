<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OW Guessr — Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0d13; --panel:#12161f; --panel-raised:#181d29; --line:#232b3a;
    --orange:#ff8a1e; --cyan:#29d3ff; --text:#e9edf3; --muted:#7c8798;
    --good:#3ddc84; --bad:#ff5c5c; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;padding:28px 16px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  h1{
    font-family:'Rajdhani',sans-serif;font-size:clamp(26px,5vw,36px);font-weight:700;
    letter-spacing:.03em;margin:0 0 4px;
    background:linear-gradient(90deg,var(--orange),#ffcf8a 45%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--muted);font-size:13px;margin:0 0 24px;}
  .login-card, .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;
  }
  .login-card{max-width:420px;margin:60px auto;}
  label{display:block;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  input{
    width:100%;background:#0d1119;border:1px solid var(--line);color:var(--text);
    border-radius:7px;padding:9px 10px;font-size:13px;font-family:'Inter',sans-serif;
    outline:none;margin-bottom:14px;
  }
  input:focus{border-color:var(--orange);}
  button{
    font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.05em;font-size:13px;
    text-transform:uppercase;border-radius:7px;border:none;padding:10px 16px;cursor:pointer;
    background:linear-gradient(90deg,var(--orange),#ffb35c);color:#1a0f00;
  }
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}
  button.ghost:hover{color:var(--text);border-color:var(--cyan);}
  .error{color:var(--bad);font-size:13px;margin-top:8px;min-height:16px;}
  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .card .n{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;}
  .card .l{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .panel{margin-bottom:24px;}
  .panel h2{font-family:'Rajdhani',sans-serif;font-size:16px;letter-spacing:.04em;margin:0 0 14px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:11px;}
  tr:last-child td{border-bottom:none;}
  .mini-dist{display:flex;gap:2px;align-items:flex-end;height:24px;}
  .mini-dist span{width:6px;background:var(--orange);border-radius:1px;min-height:2px;}
  .chart-wrap{max-width:520px;}
  #loading{color:var(--muted);text-align:center;padding:60px 0;}
  #app{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div id="loginScreen" class="login-card">
    <h1 style="font-size:24px;">OW Guessr Stats</h1>
    <p class="sub">Enter your worker URL and token once — stored only for this browser tab session.</p>
    <label for="backendUrl">Worker URL</label>
    <input id="backendUrl" placeholder="https://owguessr-stats.yoursubdomain.workers.dev">
    <label for="token">Stats token</label>
    <input id="token" type="password" placeholder="Your STATS_TOKEN">
    <button id="loginBtn">Load stats</button>
    <div class="error" id="loginError"></div>
  </div>

  <div id="loading" style="display:none;">Loading stats&hellip;</div>

  <div id="app">
    <div class="top-bar">
      <div>
        <h1>OW Guessr Stats</h1>
        <p class="sub" id="generatedAt"></p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="ghost" id="refreshBtn">Refresh</button>
        <button class="ghost" id="logoutBtn">Log out</button>
      </div>
    </div>

    <div class="cards" id="overallCards"></div>

    <div class="panel">
      <h2>Guess distribution (all wins, every puzzle combined)</h2>
      <div class="chart-wrap"><canvas id="distChart" height="220"></canvas></div>
    </div>

    <div class="panel">
      <h2>Per-puzzle breakdown</h2>
      <div style="overflow-x:auto;">
        <table id="perDayTable">
          <thead>
            <tr>
              <th>Day</th><th>Difficulty</th><th>Plays</th><th>Wins</th><th>Win rate</th>
              <th>Avg guesses</th><th>Most common</th><th>Distribution</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const loginScreen = document.getElementById('loginScreen');
const loadingEl = document.getElementById('loading');
const app = document.getElementById('app');
const loginError = document.getElementById('loginError');
let distChart = null;

function getCreds(){
  return {
    backendUrl: sessionStorage.getItem('owg_backend_url') || '',
    token: sessionStorage.getItem('owg_stats_token') || ''
  };
}

function showLogin(message){
  loadingEl.style.display = 'none';
  app.style.display = 'none';
  loginScreen.style.display = 'block';
  loginError.textContent = message || '';
}

async function loadStats(){
  const { backendUrl, token } = getCreds();
  if(!backendUrl || !token){ showLogin(); return; }

  loginScreen.style.display = 'none';
  app.style.display = 'none';
  loadingEl.style.display = 'block';

  try{
    const res = await fetch(`${backendUrl.replace(/\/$/,'')}/api/stats?token=${encodeURIComponent(token)}`);
    if(res.status === 401){
      sessionStorage.removeItem('owg_stats_token');
      showLogin('Wrong token — try again.');
      return;
    }
    if(!res.ok){
      showLogin(`Request failed (${res.status}). Check the worker URL.`);
      return;
    }
    const data = await res.json();
    render(data);
    loadingEl.style.display = 'none';
    app.style.display = 'block';
  }catch(e){
    showLogin('Could not reach that worker URL — check it\u2019s correct and deployed.');
  }
}

function card(n, l){
  return `<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`;
}

function render(data){
  document.getElementById('generatedAt').textContent =
    'Last updated ' + new Date(data.generatedAt).toLocaleString();

  const o = data.overall;
  document.getElementById('overallCards').innerHTML = [
    card(o.totalPlays, 'Total plays'),
    card(o.totalWins, 'Total wins'),
    card(o.overallWinRatePct + '%', 'Win rate'),
    card(o.overallAvgGuesses ?? '—', 'Avg guesses (wins)'),
    card(o.highestStreakEver, 'Highest streak ever'),
    card(o.gaveUpCount, 'Gave up'),
    card(o.ranOutOfGuessesCount, 'Ran out of guesses'),
  ].join('');

  if(distChart) distChart.destroy();
  distChart = new Chart(document.getElementById('distChart'), {
    type: 'bar',
    data: {
      labels: ['1','2','3','4','5','6'],
      datasets: [{
        label: 'Wins',
        data: o.guessDistribution,
        backgroundColor: '#ff8a1e',
        borderRadius: 4,
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7c8798' }, grid: { color: '#232b3a' } },
        y: { ticks: { color: '#7c8798' }, grid: { color: '#232b3a' }, beginAtZero: true }
      }
    }
  });

  const tbody = document.querySelector('#perDayTable tbody');
  tbody.innerHTML = '';
  data.perDay.forEach(row=>{
    const maxCount = Math.max(1, ...row.guessDistribution);
    const miniDist = row.guessDistribution.map(c =>
      `<span style="height:${Math.max(2, Math.round((c/maxCount)*22))}px" title="${c}"></span>`
    ).join('');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.day}</td>
      <td>${row.difficulty || '—'}</td>
      <td>${row.plays}</td>
      <td>${row.wins}</td>
      <td>${row.winRatePct}%</td>
      <td>${row.avgGuesses ?? '—'}</td>
      <td>${row.mostCommonGuessCount ?? '—'}</td>
      <td><div class="mini-dist">${miniDist}</div></td>
    `;
    tbody.appendChild(tr);
  });
}

document.getElementById('loginBtn').addEventListener('click', ()=>{
  const backendUrl = document.getElementById('backendUrl').value.trim();
  const token = document.getElementById('token').value.trim();
  if(!backendUrl || !token){ loginError.textContent = 'Both fields are required.'; return; }
  sessionStorage.setItem('owg_backend_url', backendUrl);
  sessionStorage.setItem('owg_stats_token', token);
  loadStats();
});

document.getElementById('refreshBtn').addEventListener('click', loadStats);
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem('owg_backend_url');
  sessionStorage.removeItem('owg_stats_token');
  showLogin();
});

// Pre-fill the worker URL field if we already have one saved, to make
// re-entering just the token quicker after a session clears.
document.getElementById('backendUrl').value = getCreds().backendUrl;

loadStats();
</script>
</body>
</html>
